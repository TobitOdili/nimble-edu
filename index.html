
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap');
.bx-wrap{font-family:'DM Sans',sans-serif;background:#fdf5f5;padding:3.5rem 2rem;text-align:center}
.bx-label{font-size:0.68rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#C0392B;margin-bottom:0.4rem}
.bx-heading{font-family:'Playfair Display',serif;font-size:clamp(1.5rem,3.5vw,2rem);font-weight:400;color:#1a0505;margin-bottom:2.5rem;letter-spacing:-0.3px}
.bx-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2rem;max-width:860px;margin:0 auto;align-items:end}
.bx-item{display:flex;flex-direction:column;align-items:center;gap:0}
.bx-box-wrap{width:100%;display:flex;justify-content:center;align-items:flex-end;margin-bottom:1.25rem}
.bx-box{border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden}
.bx-box-inner{width:90%;height:55%;background:#fff;border-radius:6px 6px 0 0;position:absolute;bottom:0;left:5%}
.bx-lid{border-radius:10px 10px 4px 4px;display:flex;align-items:center;justify-content:center;position:relative}
.bx-logo-inner{display:flex;flex-direction:column;align-items:center;gap:3px}
.bx-logo-text{font-family:'Playfair Display',serif;font-weight:700;color:#fff;letter-spacing:0.5px}
.bx-logo-sub{font-size:9px;color:rgba(255,255,255,0.8);letter-spacing:0.04em}
.bx-splash{position:absolute;border-radius:50%;background:rgba(255,255,255,0.12)}
.bx-badge{display:inline-flex;align-items:center;justify-content:center;background:#C0392B;color:#fff;font-size:0.75rem;font-weight:700;padding:0.35rem 1rem;border-radius:100px;letter-spacing:0.04em;margin-bottom:0.6rem}
.bx-name{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:#1a0505;margin-bottom:0.2rem}
.bx-count{font-size:0.8rem;color:#b08080}
.bx-price{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;color:#C0392B;margin:0.5rem 0 0.15rem;letter-spacing:-0.5px}
.bx-per{font-size:0.72rem;color:#b08080}
.bx-btn{margin-top:0.85rem;background:#C0392B;color:#fff;border:none;border-radius:100px;padding:0.5rem 1.25rem;font-size:0.8rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background 0.2s;white-space:nowrap}
.bx-btn:hover{background:#9B2D22}
.bx-btn.outline{background:transparent;border:1.5px solid #e8c8c8;color:#4a2020}
.bx-btn.outline:hover{background:#fff;border-color:#C0392B;color:#C0392B}
.bx-toy{position:absolute;border-radius:50%}
@media(max-width:600px){.bx-grid{grid-template-columns:1fr;align-items:center}}
</style>
